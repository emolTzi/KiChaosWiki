<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>我的Wiki</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
</head>
<body>
  <div id="app">加载中…</div>
  <script>
    window.$docsify = {
      name: '我的Wiki',
      loadSidebar: true,           // 自动加载 _sidebar.md 作为侧边栏
      subMaxLevel: 0,              // 禁用自动子导航，只用 _sidebar.md
      search: 'auto'              // 启用搜索
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script>
    // docsify插件：修复内容页路径，补上Wiki/前缀
    window.$docsify.plugins = (window.$docsify.plugins || []).concat(function(hook, vm) {
      hook.doneEach(function() {
        document.querySelectorAll('.content a[href^="#/race/"]').forEach(function(a) {
          a.href = a.href.replace('#/race/', '#/Wiki/race/');
        });
        document.querySelectorAll('.content a[href^="#/README"]').forEach(function(a) {
          a.href = a.href.replace('#/README', '#/README');
        });
      });
    });
  </script>
</body>
</html>
